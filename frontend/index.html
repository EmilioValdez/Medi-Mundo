<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MediMundo — Renta de equipo médico a domicilio. Sillas de ruedas, camas hospitalarias, concentradores de oxígeno y más." />
    <meta name="theme-color" content="#E53429" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="MediMundo — Renta de Equipo Médico a Domicilio en Querétaro" />
    <meta property="og:description" content="Renta de equipo médico sanitizado a domicilio. Sillas de ruedas, camas hospitalarias, concentradores de oxígeno y más. Entrega rápida en Querétaro." />
    <meta property="og:image" content="/logo-medimundo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_MX" />
    <meta property="og:site_name" content="MediMundo" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>MediMundo — Renta de Equipo Médico</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalBusiness",
      "name": "Medimundo",
      "description": "Renta y venta de equipo médico y de rehabilitación en Querétaro",
      "slogan": "Rehabilitación en Movimiento",
      "url": "https://medimundo.mx",
      "telephone": "+52-442-223-77-57",
      "email": "medicasaqro@gmail.com",
      "foundingDate": "2005",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Av. Canadá 212, Plaza de las Américas, Col. Carretas",
        "addressLocality": "Querétaro",
        "addressRegion": "Querétaro",
        "addressCountry": "MX"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
          "opens": "10:00",
          "closes": "19:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "10:00",
          "closes": "15:00"
        }
      ]
    }
    </script>
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
